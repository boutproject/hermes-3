spack:
  specs:
  - python
  - py-cython
  - py-numpy
  - py-pip
  - py-jinja2
  - netcdf-cxx4
  - openmpi
  - sundials
  - petsc+double+fftw+hdf5+hypre+mpi
  - slepc

  concretizer:
    unify: true
    # Pin the microarchitecture so the amd64 image is portable. Without this,
    # Spack concretizes to the build host's native microarch (AVX2/AVX-512 on
    # GitHub runners), which crashes under emulation on Apple-silicon Macs.
    # 'generic' granularity makes Spack target a portable baseline (x86_64_v2 /
    # generic aarch64) for both arches. Unlike a `packages: all: require:
    # target=...` clause, this does not constrain the compiler node (compilers
    # are graph nodes in Spack 1.x), so the externally-found gcc still concretizes.
    targets:
      granularity: generic

  view: /opt/views/view
