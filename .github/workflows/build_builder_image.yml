name: Build hermes-3-builder and hermes-3 Docker images

# Configures this workflow to run when a release is released, or when manually triggered.
on:
  workflow_dispatch:  # Allows manual triggering
  release:
    types: [released]
  schedule:
    # Run monthly, at 1:23AM UTC on the 1st
    - cron: '23 1 1 * *'

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE_NAME: boutproject/hermes-3-builder
  FINAL_IMAGE_NAME: boutproject/hermes-3
  BUILDER_DOCKERFILE: docker/hermes-3-builder.dockerfile
  FINAL_DOCKERFILE: docker/hermes-3.dockerfile

jobs:
  # Linux (amd64) and Mac (arm64) builds run as separate independent jobs.
  # If one fails, the other can still complete (fail-fast: false).

  build-builder:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYY-MM'}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable={{is_default_branch}}

      - name: Build and push builder image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.BUILDER_DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-final:
    needs: build-builder
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FINAL_IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYY-MM'}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable={{is_default_branch}}

      - name: Build and push final image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.FINAL_DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            "BUILDER_TAG=edge"
